<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Giỏ hàng</h2>

    <table border="1" width="400">
        <thead>
            <tr>
                <th>Tên</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Hình ảnh</th>
            </tr>
        </thead>

        <tbody id="cart-body"></tbody>
    </table>

    <button onclick="clearAll()">Xóa hết giỏ hàng</button>

    <script>

        let cart = JSON.parse(localStorage.getItem("cart")) || [
            { name: "Iphone 15", price: 1500, qty: 1, img: "img/iphone15.jpg" },
            { name: "Samsung S24", price: 25, qty: 2, img: "img/samsung-s24.png" },
            { name: "Xiaomi 14", price: 70, qty: 1, img: "img/xiaomi14.png" }
        ];

        localStorage.setItem("cart", JSON.stringify(cart));

        function renderCart() {

            let html = "";

            cart.forEach((item, index) => {

                html += `
            <tr>
                <td>${item.name}</td>

                <td>${item.price}</td>

                <td>
                    <input 
                        type="number"
                        value="${item.qty}"
                        min="1"
                        onchange="updateQty(${index}, this.value)"
                    >
                </td>

                <td>
                    <center>
                        <img src="${item.img}" width="80">
                    </center>
                </td>
            </tr>
            `;
            });

            document.getElementById("cart-body").innerHTML = html;
        }

        function updateQty(index, newQty) {

            cart[index].qty = Number(newQty);

            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function clearAll() {

            localStorage.removeItem("cart");

            document.getElementById("cart-body").innerHTML = "";
        }

        renderCart();

    </script>
</body>

</html>
