<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3 id="message"> Chào mọi người</h3>
    <button onclick="doiMau()"> Đổi màu</button>
    <button onclick="inNoiDung()"> In Nội Dung</button>
    <button onclick="inNoiDungCu()"> Quay lại nội dung cũ</button>


    
    <script>
        function doiMau() {
            var element = document.getElementById("message");
            if (element.style.color == 'blue') {
                element.style.color = 'red';
            } else {
                element.style.color = 'blue'
            }
        }
        function inNoiDung() {
            document.getElementById("message").innerHTML = "Chào tất cả mọi người";
        }
        function inNoiDungCu() {
            document.getElementById("message").innerHTML = "Chào mọi người";
        }


    </script>
</body>

</html>
